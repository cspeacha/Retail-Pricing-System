    <style>
:root {
  --ink: #14211f;
  --line: #c9d6d2;
  --accent: #176b5b;
  --panel: #f5f8f7;
  --bg: #e8eeee;
}
* { box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body {
  margin: 0;
  color: var(--ink);
  background: var(--bg);
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}
button { font: inherit; }
.tool-header {
  height: 58px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
  display: flex;
  align-items: center;
  padding: 9px 14px;
}
.tool-tabs { display: flex; align-items: center; gap: 8px; }
.tool-tabs button {
  min-height: 40px;
  border: 1px solid #aab8b5;
  border-radius: 7px;
  background: #ffffff;
  color: var(--ink);
  padding: 0 16px;
  cursor: pointer;
  font-weight: 900;
}
.tool-tabs button.active { border-color: var(--accent); background: var(--accent); color: #ffffff; }
.tool-frame-wrap { height: calc(100vh - 58px); }
iframe { display: block; width: 100%; height: 100%; border: 0; background: #ffffff; }
@media (max-width: 560px) {
  .tool-header { height: auto; padding: 8px; }
  .tool-tabs { width: 100%; display: grid; grid-template-columns: 1fr; }
  .tool-frame-wrap { height: calc(100vh - 154px); }
}
</style>

utton.textContent = state.labels[state.activeIndex] ? \"Update Tag\" : \"Add Tag\";\n\n  if (count === TOTAL_LABELS) {\n    statusText.textContent = \"Page filled. Ready for printing.\";\n    activeLabelText.textContent = \"All 32 labels are filled\";\n  } else {\n    statusText.textContent = `Label ${state.activeIndex + 1} of ${TOTAL_LABELS} is ready.`;\n    activeLabelText.textContent = `Filling label ${state.activeIndex + 1}`;\n  }\n}\n\nfunction createBarcodeSvg(value) {\n  const safeValue = value || \" \";\n  const codes = [104];\n  for (const char of safeValue) {\n    const code = char.charCodeAt(0) - 32;\n    if (code < 0 || code > 95) {\n      throw new Error(\"Code 128 barcode supports standard printable keyboard characters.\");\n    }\n    codes.push(code);\n  }\n\n  let checksum = codes[0];\n  for (let index = 1; index < codes.length; index += 1) {\n    checksum += codes[index] * index;\n  }\n  codes.push(checksum % 103, 106);\n\n  const moduleWidth = 1.35;\n  const height = 44;\n  let x = 0;\n  const bars = [];\n\n  codes.forEach((code) => {\n    const pattern = CODE_128_PATTERNS[code];\n    for (let i = 0; i < pattern.length; i += 1) {\n      const width = Number(pattern[i]) * moduleWidth;\n      if (i % 2 === 0) {\n        bars.push(`<rect x=\"${x.toFixed(2)}\" y=\"0\" width=\"${width.toFixed(2)}\" height=\"${height}\"><\/rect>`);\n      }\n      x += width;\n    }\n  });\n\n  const svg = document.createElementNS(\"http://www.w3.org/2000/svg\", \"svg\");\n  svg.setAttribute(\"viewBox\", `0 0 ${x.toFixed(2)} ${height}`);\n  svg.setAttribute(\"role\", \"img\");\n  svg.setAttribute(\"aria-label\", `Code 128 barcode for ${safeValue}`);\n  svg.innerHTML = bars.join(\"\");\n  return svg;\n}\n\nasync function exportXlsx() {\n  const workbook = window.TAG_MASTER_TEMPLATE_FILES\n    ? await createTemplateXlsxWorkbook(state.labels)\n    : createPlainXlsxWorkbook(state.labels);\n  const blob = new Blob([workbook], {\n    type: \"application/vnd.openxmlformats-off , barcodeValue, x + 10, y + height - 13, width - 20, 7, pageHeight);\n}\n\nfunction drawText(commands, text, x, topY, pageHeight, size, fontName) {\n  if (!text) return;\n  const baseline = pageHeight - topY;\n  commands.push(`BT /${fontName} ${size} Tf 1 0 0 1 ${roundPdf(x)} ${roundPdf(baseline)} Tm (${escapePdfText(text)}) Tj ET`);\n}\n\nfunction drawCenteredText(commands, text, centerX, topY, pageHeight, size, fontName, maxWidth) {\n  if (!text) return;\n  const fitted = fitPdfText(text, size, maxWidth);\n  const textWidth = estimatePdfTextWidth(fitted, size);\n  drawText(commands, fitted, centerX - textWidth / 2, topY, pageHeight, size, fontName);\n}\n\nfunction fitPdfText(text, size, maxWidth) {\n  let output = String(text);\n  while (output.length > 1 && estimatePdfTextWidth(output, size) > maxWidth) {\n    output = output.slice(0, -1);\n  }\n  return output;\n}\n\nfunction estimatePdfTextWidth(text, size) {\n  return String(text).length * size * 0.56;\n}\n\nfunction drawPdfBarcode(commands, value, x, topY, width, height, pageHeight) {\n  if (!value) return;\n  const patterns = code128PatternsForValue(value);\n  const quietModules = 12;\n  const totalModules = patterns.reduce((total, pattern) => (\n    total + [...pattern].reduce((sum, module) => sum + Number(module), 0)\n  ), 0);\n  const moduleWidth = width / (totalModules + quietModules * 2);\n  let cursor = x + quietModules * moduleWidth;\n  const y = pageHeight - topY - height;\n\n  commands.push(\"0 0 0 rg\");\n  patterns.forEach((pattern) => {\n    for (let i = 0; i < pattern.length; i += 1) {\n      const barWidth = Number(pattern[i]) * moduleWidth;\n      if (i % 2 === 0) {\n        commands.push(`${roundPdf(cursor)} ${roundPdf(y)} ${roundPdf(barWidth)} ${roundPdf(height)} re f`);\n      }\n      cursor += barWidth;\n    }\n  });\n}\n\nfunction buildPdf(pageWidth, pageHeight, content) {\n  const objects = [\n    \"<< /Type /Catalog /Pages 2 0 R >>\",\n    \"<< /Type /Pages /Kids [3 0 R] /Count 1 >>\",\n    `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidth} ${pageHeight}] /Resources << /Font << /F1 4 0 R /F2 5 0 R >> >> /Contents 6 0 R >>`,\n    \"<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>\",\n    \"<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>\",\n    `<< /Length ${content.length} >>\\nstream\\n${content}\\nendstream`\n  ];\n  let pdf = \"%PDF-1.4\\n\";\n  const offsets = [0];\n  objects.forEach((object, index) => {\n    offsets.push(pdf.length);\n    pdf += `${index + 1} 0 obj\\n${object}\\nendobj\\n`;\n  });\n  const xrefOffset = pdf.length;\n  pdf += `xref\\n0 ${objects.length + 1}\\n0000000000 65535 f \\n`;\n  offsets.slice(1).forEach((offset) => {\n    pdf += `${String(offset).padStart(10, \"0\")} 00000 n \\n`;\n  });\n  pdf += `trailer\\n<< /Size ${objects.length + 1} /Root 1 0 R >>\\nstartxref\\n${xrefOffset}\\n%%EOF`;\n\n  const bytes = new Uint8Array(pdf.length);\n  for (let i = 0; i < pdf.length; i += 1) {\n    bytes[i] = pdf.charCodeAt(i) & 0xff;\n  }\n  return bytes;\n}\n\nfunction escapePdfText(value) {\n  return String(value)\n    .replace(/\\\\/g, \"\\\\\\\\\")\n    .replace(/\\(/g, \"\\\\(\")\n    .replace(/\\)/g, \"\\\\)\");\n}\n\nfunction roundPdf(value) {\n  return Number(value).toFixed(3).replace(/\\.?0+$/, \"\");\n}\n\nfunction createPlainXlsxWorkbook(labels) {\n  const headers = [\"Label\", \"Description\", \"Price\", \"Order Number\", \"UPC\", \"Barcode Value\"];\n  const rows = labels.map((label, index) => [\n    index + 1,\n    label?.description || \"\",\n    label?.price || \"\",\n    label?.orderNumber || \"\",\n    label?.upc || \"\",\n    label?.barcodeValue || \"\"\n  ]);\n  return createXlsxWorkbook([headers, ...rows]);\n}\n\nasync function createTemplateXlsxWorkbook(labels) {\n  const files = decodeTemplateFiles(window.TAG_MASTER_TEMPLATE_FILES);\n  const sheetPath = \"xl/worksheets/sheet2.xml\";\n  const decoder = new TextDecoder();\n  const sheetXml = decoder.decode(files[sheetPath]);\n  const barcodeImages = await Promise.all(labels.map((label) => {\n    const value = label?.barcodeValue || label?.orderNumber || \"\";\n    return value ? createBarcodePngBytes(value) : Promise.resolve(null);\n  }));\n\n  files[\"xl/styles.xml\"] = addFinalTagStyles(textFromFile(files[\"xl/styles.xml\"]));\n  files[\"xl/workbook.xml\"] = setTemplatePrintArea(textFromFile(files[\"xl/workbook.xml\"]));\n  files[sheetPath] = fillTemplateWorksheet(sheetXml, labels);\n  addBarcodeImagesToTemplate(files, labels, barcodeImages);\n  return zipFiles(files);\n}\n\nfunction decodeTemplateFiles(source) {\n  const files = {};\n  Object.entries(source).forEach(([name, base64]) => {\n    const binary = atob(base64);\n    const bytes = new Uint8Array(binary.length);\n    for (let i = 0; i < binary.length; i += 1) {\n      bytes[i] = binary.charCodeAt(i);\n    }\n    files[name] = bytes;\n  });\n  return files;\n}\n\nfunction fillTemplateWorksheet(sheetXml, labels) {\n  const parser = new DOMParser();\n  const doc = parser.parseFromString(sheetXml, \"application/xml\");\n  const parseError = doc.querySelector(\"parsererror\");\n  if (parseError) {\n    throw new Error(\"The Excel template could not be read.\");\n  }\n\n  enforceShelfTagPrintSettings(doc);\n\n  labels.forEach((label, index) => {\n    const rowBlock = Math.floor(index / 4);\n    const colBlock = index % 4;\n    const row = 2 + rowBlock * 4;\n    const leftCol = 1 + colBlock * 2;\n    const rightCol = leftCol + 1;\n\n    setCellText(doc, cellRef(leftCol, row), label?.description || \"\");\n    setCellStyle(doc, cellRef(leftCol, row), TEMPLATE_STYLE.description);\n    setCellText(doc, cellRef(leftCol, row + 1), label?.orderNumber || \"\");\n    setCellValue(doc, cellRef(rightCol, row + 1), priceNumber(label?.price), label?.price || \"\");\n    setCellStyle(doc, cellRef(rightCol, row + 1), TEMPLATE_STYLE.price);\n    setCellText(doc, cellRef(leftCol, row + 2), label?.upc || \"\");\n    setCellStyle(doc, cellRef(leftCol, row + 2), TEMPLATE_STYLE.upc);\n    setCellText(doc, cellRef(leftCol, row + 3), \"\");\n    setCellStyle(doc, cellRef(leftCol, row + 3), TEMPLATE_STYLE.barcode);\n    setCellText(doc, cellRef(rightCol, row + 3), \"\");\n    setCellStyle(doc, cellRef(rightCol, row + 3), TEMPLATE_STYLE.barcode);\n  });\n\n  mergeFullWidthBarcodeRows(doc);\n  return new XMLSerializer().serializeToString(doc);\n}\n\nfunction setTemplatePrintArea(workbookXml) {\n  return workbookXml.replace(\n    /<definedName name=\"_xlnm\\.Print_Area\" localSheetId=\"1\">[^<]+<\\/definedName>/,\n    '<definedName name=\"_xlnm.Print_Area\" localSheetId=\"1\">\\'32UP TAGS\\'!$A$2:$H$33<\/definedName>'\n  );\n}\n\nfunction enforceShelfTagPrintSettings(doc) {\n  const namespace = doc.documentElement.namespaceURI;\n  const worksheet = doc.documentElement;\n\n  let printOptions = doc.getElementsByTagNameNS(namespace, \"printOptions\")[0];\n  if (!printOptions) {\n    printOptions = doc.createElementNS(namespace, \"printOptions\");\n    worksheet.appendChild(printOptions);\n  }\n  printOptions.setAttribute(\"horizontalCentered\", \"1\");\n\n  let pageMargins = doc.getElementsByTagNameNS(namespace, \"pageMargins\")[0];\n  if (!pageMargins) {\n    pageMargins = doc.createElementNS(namespace, \"pageMargins\");\n    worksheet.appendChild(pageMargins);\n  }\n  pageMargins.setAttribute(\"top\", \"0.7\");\n  pageMargins.setAttribute(\"left\", \"0.6\");\n  pageMargins.setAttribute(\"bottom\", \"0.5\");\n  pageMargins.setAttribute(\"right\", \"0.0\");\n  pageMargins.setAttribute(\"header\", \"0\");\n  pageMargins.setAttribute(\"footer\", \"0\");\n}\n\nconst TEMPLATE_STYLE = {\n  description: \"18\",\n  price: \"19\",\n  upc: \"20\",\n  barcode: \"5\"\n};\n\nfunction mergeFullWidthBarcodeRows(doc) {\n  const namespace = doc.documentElement.namespaceURI;\n  let mergeCells = doc.getElementsByTagNameNS(namespace, \"mergeCells\")[0];\n  if (!mergeCells) {\n    mergeCells = doc.createElementNS(namespace, \"mergeCells\");\n    const phoneticPr = doc.getElementsByTagNameNS(namespace, \"phoneticPr\")[0];\n    doc.documentElement.insertBefore(mergeCells, phoneticPr || null);\n  }\n\n  const existingRefs = new Set(Array.from(mergeCells.children).map((cell) => cell.getAttribute(\"ref\")));\n  for (let rowBlock = 0; rowBlock < 8; rowBlock += 1) {\n    const row = 5 + rowBlock * 4;\n    for (let colBlock = 0; colBlock < 4; colBlock += 1) {\n      const leftCol = 1 + colBlock * 2;\n      const ref = `${cellRef(leftCol, row)}:${cellRef(leftCol + 1, row)}`;\n      if (existingRefs.has(ref)) continue;\n      const mergeCell = doc.createElementNS(namespace, \"mergeCell\");\n      mergeCell.setAttribute(\"ref\", ref);\n      mergeCells.appendChild(mergeCell);\n      existingRefs.add(ref);\n    }\n  }\n\n  mergeCells.setAttribute(\"count\", String(mergeCells.children.length));\n}\n\nfunction addFinalTagStyles(stylesXml) {\n  if (stylesXml.includes('name=\"ShelfTagFinalStyles\"')) return stylesXml;\n\n  const extraStyles = [\n    '<xf numFmtId=\"0\" fontId=\"10\" fillId=\"0\" borderId=\"0\" xfId=\"0\" applyFont=\"1\" applyAlignment=\"1\"><alignment horizontal=\"center\" vertical=\"center\" wrapText=\"1\"/><\/xf>',\n    '<xf numFmtId=\"8\" fontId=\"9\" fillId=\"0\" borderId=\"0\" xfId=\"0\" applyNumberFormat=\"1\" applyFont=\"1\" applyAlignment=\"1\"><alignment horizontal=\"center\" vertical=\"center\"/><\/xf>',\n    '<xf numFmtId=\"0\" fontId=\"14\" fillId=\"0\" borderId=\"0\" xfId=\"0\" applyFont=\"1\" applyAlignment=\"1\"><alignment horizontal=\"center\" vertical=\"center\" shrinkToFit=\"1\"/><\/xf>'\n  ].join(\"\");\n\n  return stylesXml\n    .replace(/<cellXfs count=\"18\">/, '<cellXfs count=\"21\">')\n    .replace(\"<\/cellXfs>\", `${extraStyles}<\/cellXfs>`)\n    .replace(/<cellStyles count=\"1\">/, '<cellStyles count=\"2\">')\n    .replace(\"<\/cellStyles>\", '<cellStyle name=\"ShelfTagFinalStyles\" xfId=\"0\"/><\/cellStyles>');\n}\n\nfunction addBarcodeImagesToTemplate(files, labels, barcodeImages) { });\n\nundoButton.addEventListener(\"click\", () => {\n  const previous = Math.max(0, state.activeIndex - 1);\n  state.activeIndex = previous;\n  if (state.labels[previous]) loadLabelIntoForm(state.labels[previous]);\n  renderSheet();\n  updateStatus();\n  save();\n});\n\ndocument.querySelector(\"#printButton\").addEventListener(\"click\", () => window.print());\ndocument.querySelector(\"#pdfButton\").addEventListener(\"click\", (event) => {\n  const button = event.currentTarget;\n  button.disabled = true;\n  try {\n    exportPdf();\n  } catch (error) {\n    alert(error.message || \"The PDF file could not be created.\");\n  } finally {\n    button.disabled = false;\n  }\n});\ndocument.querySelector(\"#clearButton\").addEventListener(\"click\", () => {\n  if (!confirm(\"Clear all 32 labels?\")) return;\n  state.labels = Array.from({ length: TOTAL_LABELS }, () => null);\n  state.activeIndex = 0;\n  clearForm();\n  renderSheet();\n  updateStatus();\n  save();\n});\n\ninit();\n\n<\/script>\n  <\/body>\n<\/html>\n"},"sale-tags":{"title":"Sale Tags","html":"<!doctype html>\n<html lang=\"en\">\n  <head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Sale Tag Maker<\/title>\n    <style>\n:root {\n  --ink: #1d2326;\n  --muted: #66757c;\n  --panel: #f4f7f6;\n  --line: #cfd8d5;\n  --sale-red: #c9143a;\n  --sale-yellow: #fff023;\n  --paper: #fffefa;\n  --accent: #176b5b;\n  --shadow: 0 18px 50px rgba(23, 35, 40, 0.16);\n}\n\n* {\n  box-sizing: border-box;\n}\n\nbody {\n  margin: 0;\n  min-height: 100vh;\n  color: var(--ink);\n  background: #e8eeee;\n  font-family: Arial, Helvetica, sans-serif;\n}\n\nbutton,\ninput,\ntextarea {\n  font: inherit;\n}\n\nbutton {\n  min-height: 42px;\n  border: 1px solid #aab8b5;\n  border-radius: 7px;\n  background: #ffffff;\n  color: var(--ink);\n  cursor: pointer;\n  font-weight: 700;\n}\n\nbutton.primary {\n  border-color: var(--accent);\n  background: var(--accent);\n  color: #ffffff;\n}\n\nbutton:disabled {\n  cursor: not-allowed;\n  opacity: 0.45;\n}\n\n.app-shell {\n  display: grid;\n  grid-template-columns: minmax(320px, 390px) minmax(680px, 1fr);\n  gap: 24px;\n  align-items: start;\n  width: min(1500px, calc(100% - 32px));\n  margin: 0 auto;\n  padding: 22px 0;\n}\n\n.controls,\n.sheet-panel {\n  background: var(--panel);\n  border: 1px solid #d6dfdd;\n  border-radius: 8px;\n  box-shadow: var(--shadow);\n}\n\n.controls {\n  position: sticky;\n  top: 18px;\n  padding: 20px;\n}\n\n.brand-row,\n.sheet-toolbar {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 16px;\n}\n\n.brand-row {\n  margin-bottom: 18px;\n}\n\nh1 {\n  margin: 0 0 5px;\n  font-size: 26px;\n  line-height: 1.1;\n}\n\np {\n  margin: 0;\n  color: var(--muted);\n}\n\n.counter {\n  display: grid;\n  place-items: center;\n  width: 76px;\n  height: 64px;\n  border: 1px solid var(--line);\n  border-radius: 8px;\n  background: #ffffff;\n}\n\n.counter span {\n  font-size: 27px;\n  font-weight: 800;\n  line-height: 1;\n}\n\n.counter small {\n  color: var(--muted);\n  font-weight: 700;\n}\n\nform,\n.actions {\n  display: grid;\n  gap: 14px;\n}\n\nlabel {\n  display: grid;\n  gap: 7px;\n  color: #334045;\n  font-size: 13px;\n  font-weight: 800;\n  text-transform: uppercase;\n}\n\ninput,\ntextarea {\n  width: 100%;\n  border: 1px solid #aab8b5;\n  border-radius: 7px;\n  background: #ffffff;\n  color: var(--ink);\n  padding: 10px 11px;\n  resize: vertical;\n}\n\n.two-column,\n.button-row,\n.actions {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 10px;\n}\n\n.button-row {\n  grid-template-columns: 1fr 82px 82px;\n}\n\n.actions {\n  margin-top: 18px;\n  padding-top: 18px;\n  border-top: 1px solid var(--line);\n}\n\n.notice {\n  margin-top: 16px;\n  border: 1px solid #ebb28d;\n  border-radius: 8px;\n  background: #fff6ef;\n  color: #a64218;\n  padding: 12px;\n  font-weight: 800;\n}\n\n.sheet-panel {\n  overflow: auto;\n  padding: 18px;\n}\n\n.sheet-toolbar {\n  margin-bottom: 14px;\n  color: var(--muted);\n}\n\n.sheet-toolbar strong {\n  color: var(--ink);\n}\n\n.tag-sheet {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  grid-template-rows: repeat(3, 1fr);\n  gap: 0;\n  width: 10.5in;\n  min-height: 13.15in;\n  margin: 0 auto;\n  padding: 0.22in;\n  background: var(--paper);\n  border: 1px solid #b9c5c2;\n}\n\n.sale-tag {\n  position: relative;\n  display: block;\n  min-width: 0;\n  min-height: 4.15in;\n  height: 100%;\n  border: 1px dashed #e7a1ad;\n  border-radius: 7px;\n  background: var(--sale-red);\n  overflow: hidden;\n  appearance: none;\n  color: inherit;\n  font: inherit;\n  text-align: inherit;\n}\n\n.sale-tag .tag-body {\n  display: grid;\n  grid-template-rows: 0.64in 0.56in 0.81in minmax(1.55in, 1fr) 0.5in;\n  position: absolute;\n  inset: 0;\n  min-width: 0;\n}\n\n.sale-tag.active {\n  outline: 3px solid rgba(23, 107, 91, 0.35);\n  outline-offset: -3px;\n}\n\n.sale-tag.empty {\n  display: grid;\n  place-items: center;\n  background: #fffefa;\n  color: #98a19e;\n  font-weight: 800;\n}\n\n.top-strip {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  grid-template-rows: auto auto auto;\n  gap: 6px;\n  align-items: start;\n  min-width: 0;\n  margin: 0.09in 0.08in 0;\n  padding: 0.04in 0.05in;\n  background: #ffffff;\n}\n\n.description {\n  min-width: 0;\n  font-size: 0.105in;\n  font-weight: 900;\n  line-height: 1.05;\n  overflow-wrap: anywhere;\n  text-transform: uppercase;\n}\n\n.size-value {\n  grid-column: 2 / 3;\n  grid-row: 3 / 4;\n  align-self: end;\n  color: #111111;\n  font-size: 0.085in;\n  font-weight: 900;\n  line-height: 1.1;\n  text-align: right;\n  white-space: nowrap;\n}\n\n.item-codes {\n  grid-column: 1 / 2;\n  grid-row: 2 / 4;\n  color: #111111;\n  font-size: 0.065in;\n  font-weight: 800;\n  line-height: 1.15;\n  text-align: left;\n  white-space: nowrap;\n}\n\n.sale-banner {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--sale-yellow);\n  font-size: 0.24in;\n  font-weight: 900;\n  line-height: 1;\n}\n\n.sale-banner span:first-child {\n  font-weight: 500;\n  margin-right: 0.04in;\n}\n\n.price-panel {\n  display: grid;\n  place-items: center;\n  margin: 0 0.08in;\n  background: #ffffff;\n  color: #1b1b1b;\n}\n\n.sale-price {\n  font-size: 0.48in;\n  font-weight: 900;\n  line-height: 0.9;\n}\n\n.footer-strip {\n  display: grid;\n  grid-template-columns: 0.56in minmax(0.88in, 1fr) 0.58in;\n  align-items: end;\n  align-self: end;\n  gap: 0.05in;\n  min-width: 0;\n  padding: 0 0.08in 0.08in;\n  grid-row: 5;\n}\n\n.save-label {\n  color: var(--sale-yellow);\n  font-size: 0.18in;\n}\n\n.savings-box {\n  display: grid;\n  place-items: center;\n  min-height: 0.35in;\n  background: #ffffff;\n  color: #111111;\n  font-size: 0.2in;\n  font-weight: 900;\n}\n\n.end-date {\n  color: #111111;\n  background: #ffffff;\n  padding: 0.03in;\n  font-size: 0.07in;\n  font-weight: 900;\n  line-height: 1.05;\n  text-align: right;\n  min-height: 0.35in;\n}\n\n@media (max-width: 1120px) {\n  .app-shell {\n    grid-template-columns: 1fr;\n  }\n\n  .controls {\n    position: static;\n  }\n}\n\n@media (max-width: 520px) {\n  .app-shell {\n    width: calc(100% - 18px);\n    padding: 9px 0;\n  }\n\n  .two-column,\n  .button-row,\n  .actions {\n    grid-template-columns: 1fr;\n  }\n}\n\n@media print {\n  @page {\n    size: letter portrait;\n    margin: 0;\n  }\n\n  body {\n    background: #ffffff;\n  }\n\n  .controls,\n  .sheet-toolbar {\n    display: none !important;\n  }\n\n  .app-shell {\n    display: block;\n    width: auto;\n    margin: 0;\n    padding: 0;\n  }\n\n  .sheet-panel {\n    border: 0;\n    box-shadow: none;\n    overflow: visible;\n    padding: 0;\n    background: transparent;\n  }\n}\n\n<\/style>\n  <\/head>\n  <body>\n    <main class=\"app-shell\">\n      <section class=\"controls\" aria-label=\"Sale tag entry form\">\n        <div class=\"brand-row\">\n          <div>\n            <h1>Sale Tag Maker<\/h1>\n            <p id=\"statusText\">Tag 1 of 12 is ready.<\/p>\n          <\/div>\n          <div class=\"counter\" aria-live=\"polite\">\n            <span id=\"filledCount\">0<\/span><small>/12<\/small>\n          <\/div>\n        <\/div>\n\n        <form id=\"tagForm\" autocomplete=\"off\">\n          <label>\n            Description\n            <textarea id=\"description\" rows=\"2\" maxlength=\"60\" required><\/textarea>\n          <\/label>\n\n          <div class=\"two-column\">\n            <label>\n              Size\n              <input id=\"size\" type=\"text\" placeholder=\"12 OZ\" required>\n            <\/label>\n            <label>\n              Order No.\n              <input id=\"orderNumber\" type=\"text\" required>\n            <\/label>\n          <\/div>\n\n          <label>\n            UPC\n            <input id=\"upc\" type=\"text\" inputmode=\"numeric\" required>\n          <\/label>\n\n          <div class=\"two-column\">\n            <label>\n              Sale Price\n              <input id=\"salePrice\" type=\"text\" inputmode=\"decimal\" placeholder=\"1.99\" required>\n            <\/label>\n            <label>\n              Savings\n              <input id=\"savings\" type=\"text\" placeholder=\"50¢\" required>\n            <\/label>\n          <\/div>\n\n          <label>\n            Sale End Date\n            <input id=\"endDate\" type=\"text\" placeholder=\"08/05/26\" required>\n          <\/label>\n\n          <div class=\"button-row\">\n            <button type=\"submit\" class=\"primary\" id=\"addButton\">Add Tag<\/button>\n            <button type=\"button\" id=\"skipButton\">Skip<\/button>\n            <button type=\"button\" id=\"undoButton\" disabled>Back<\/button>\n          <\/div>\n        <\/form>\n\n        <div class=\"actions\" aria-label=\"Page actions\">\n          <button type=\"button\" id=\"printButton\">Print Preview<\/button>\n          <button type=\"button\" id=\"pdfButton\">Export PDF<\/button>\n          <button type=\"button\" id=\"clearButton\">Clear Page<\/button>\n        <\/div>\n\n        <div class=\"notice\" id=\"pageNotice\" hidden>\n          Page filled. All 12 sale tags are ready for printing.\n        <\/div>\n      <\/section>\n\n      <section class=\"sheet-panel\" aria-label=\"Printable sale tag sheet\">\n        <div class=\"sheet-toolbar\">\n          <strong>Printable Sheet<\/strong>\n          <span id=\"activeLabelText\">Filling tag 1<\/span>\n        <\/div>\n        <div class=\"tag-sheet\" id=\"tagSheet\"><\/div>\n      <\/section>\n    <\/main><script>\n\n\nconst TOTAL_TAGS = 12;\n\nconst CODE_128_PATTERNS = [\n  \"212222\", \"222122\", \"222221\", \"121223\", \"121322\", \"131222\", \"122213\", \"122312\",\n  \"132212\", \"221213\", \"221312\", \"231212\", \"112232\", \"122132\", \"122231\", \"113222\",\n  \"123122\", \"123221\", \"223211\", \"221132\", \"221231\", \"213212\", \"223112\", \"312131\",\n  \"311222\", \"321122\", \"321221\", \"312212\", \"322112\", \"322211\", \"212123\", \"212321\",\n  \"232121\", \"111323\", \"131123\", \"131321\", \"112313\", \"132113\", \"132311\", \"211313\",\n  \"231113\", \"231311\", \"112133\", \"112331\", \"132131\", \"113123\", \"113321\", \"133121\",\n  \"313121\", \"211331\", \"231131\", \"213113\", \"213311\", \"213131\", \"311123\", \"311321\",\n  \"331121\", \"312113\", \"312311\", \"332111\", \"314111\", \"221411\", \"431111\", \"111224\",\n  \"111422\", \"121124\", \"121421\", \"141122\", \"141221\", \"112214\", \"112412\", \"122114\",\n  \"122411\", \"142112\", \"142211\", \"241211\", \"221114\", \"413111\", \"241112\", \"134111\",\n  \"111242\", \"121142\", \"121241\", \"114212\", \"124112\", \"124211\", \"411212\", \"421112\",\n  \"421211\", \"212141\", \"214121\", \"412121\", \"111143\", \"111341\", \"131141\", \"114113\",\n  \"114311\", \"411113\", \"411311\", \"113141\", \"114131\", \"311141\", \"411131\", \"211412\",\n  \"211214\", \"211232\", \"2331112\"\n];\n\nconst state = {\n  tags: Array.from({ length: TOTAL_TAGS }, () => null),\n  activeIndex: 0\n};\n\nconst fields = {\n  description: document.querySelector(\"#description\"),\n  size: document.querySelector(\"#size\"),\n  upc: document.querySelector(\"#upc\"),\n  orderNumber: document.querySelector(\"#orderNumber\"),\n  salePrice: document.querySelector(\"#salePrice\"),\n  savings: document.querySelector(\"#savings\"),\n  endDate: document.querySelector(\"#endDate\")\n};\n\nconst sheet = document.querySelector(\"#tagSheet\");\nconst form = document.querySelector(\"#tagForm\");\nconst statusText = document.querySelector(\"#statusText\");\nconst activeLabelText = document.querySelector(\"#activeLabelText\");\nconst filledCount = document.querySelector(\"#filledCount\");\nconst pageNotice = document.querySelector(\"#pageNotice\");\nconst addButton = document.querySelector(\"#addButton\");\nconst undoButton = document.querySelector(\"#undoButton\");\n\nfunction init() {\n  const saved = localStorage.getItem(\"sale-tag-maker-state\");\n  if (saved) {\n    try {\n      const parsed = JSON.parse(saved);\n      if (Array.isArray(parsed.tags) && parsed.tags.length === TOTAL_TAGS) {\n        state.tags = parsed.tags;\n        state.activeIndex = Math.min(parsed.activeIndex || firstOpenIndex(), TOTAL_TAGS - 1);\n      }\n    } catch {\n      localStorage.removeItem(\"sale-tag-maker-state\");\n    }\n  }\n\n  renderSheet();\n  updateStatus();\n  fields.description.focus();\n}\n\nfunction save() {\n  localStorage.setItem(\"sale-tag-maker-state\", JSON.stringify(state));\n}\n\nfunction firstOpenIndex() {\n  const open = state.tags.findIndex((tag) => !tag);\n  return open === -1 ? TOTAL_TAGS - 1 : open;\n}\n\nfunction cleanMoney(value) {\n  const trimmed = value.trim();\n  if (!trimmed) return \"\";\n  if (trimmed.includes(\"/\") || trimmed.startsWith(\"$\")) return trimmed;\n  return `${trimmed}`;\n}\n\nfunction currentFormData() {\n  return {\n    description: fields.description.value.trim(),\n    size: fields.size.value.trim(),\n    upc: fields.upc.value.trim(),\n    orderNumber: fields.orderNumber.value.trim(),\n    salePrice: cleanMoney(fields.salePrice.value),\n    savings: fields.savings.value.trim(),\n    endDate: fields.endDate.value.trim()\n  };\n}\n\nfunction clearForm() {\n  form.reset();\n  fields.description.focus();\n}\n\nfunction advance() {\n  const open = state.tags.findIndex((tag, index) => !tag && index > state.activeIndex);\n  state.activeIndex = open === -1 ? firstOpenIndex() : open;\n}\n\nfunction renderSheet() {\n  sheet.innerHTML = \"\";\n  state.tags.forEach((tag, index) => {\n    const item = document.createElement(\"button\");\n    item.type = \"button\";\n    item.className = `sale-tag ${tag ? \"\" : \"empty\"} ${index === state.activeIndex ? \"active\" : \"\"}`;\n    item.setAttribute(\"aria-label\", `Tag ${index + 1}`);\n    item.addEventListener(\"click\", () => {\n      state.activeIndex = index;\n      if (state.tags[index]) loadTagIntoForm(state.tags[index]);\n      renderSheet();\n      updateStatus();\n      save();\n    });\n\n    if (!tag) {\n      item.textContent = index + 1;\n    } else {\n      item.appendChild(tagContent(tag));\n    }\n\n    sheet.appendChild(item);\n  });\n}\n\nfunction tagContent(tag) {\n  const wrap = document.createElement(\"div\");\n  wrap.className = \"tag-body\";\n  wrap.innerHTML = `\n    <div class=\"top-strip\">\n      <div class=\"description\"><\/div>\n      <div class=\"size-value\"><\/div>\n      <div class=\"item-codes\"><\/div>\n    <\/div>\n    <div class=\"sale-banner\"><span>on<\/span><span>SALE!<\/span><\/div>\n    <div class=\"price-panel\"><div class=\"sale-price\"><\/div><\/div>\n    <div class=\"footer-strip\">\n      <div class=\"save-label\">save<\/div>\n      <div class=\"savings-box\"><\/div>\n      <div class=\"end-date\"><\/div>\n    <\/div>\n  `;\n  wrap.querySelector(\".description\").textContent = tag.description;\n  wrap.querySelector(\".size-value\").textContent = tag.size;\n  wrap.querySelector(\".item-codes\").innerHTML = `${escapeHtml(tag.upc)}<br>${escapeHtml(tag.orderNumber)}`;\n  wrap.querySelector(\".sale-price\").textContent = tag.salePrice;\n  wrap.querySelector(\".savings-box\").textContent = tag.savings;\n  wrap.querySelector(\".end-date\").innerHTML = `sale ends<br>${escapeHtml(tag.endDate)}`;\n  return wrap;\n}\n\nfunction loadTagIntoForm(tag) {\n  fields.description.value = tag.description;\n  fields.size.value = tag.size;\n  fields.upc.value = tag.upc;\n  fields.orderNumber.value = tag.orderNumber;\n  fields.salePrice.value = tag.salePrice.replace(/^\\$/, \"\");\n  fields.savings.value = tag.savings;\n  fields.endDate.value = tag.endDate;\n}\n\nfunction updateStatus() {\n  const count = state.tags.filter(Boolean).length;\n  filledCount.textContent = count;\n  undoButton.disabled = state.activeIndex === 0 && !state.tags[0];\n  pageNotice.hidden = count !== TOTAL_TAGS;\n  addButton.textContent = state.tags[state.activeIndex] ? \"Update Tag\" : \"Add Tag\";\n\n  if (count === TOTAL_TAGS) {\n    statusText.textContent = \"Page filled. Ready for printing.\";\n    activeLabelText.textContent = \"All 12 sale tags are filled\";\n  } else {\n    statusText.textContent = `Tag ${state.activeIndex + 1} of ${TOTAL_TAGS} is ready.`;\n    activeLabelText.textContent = `Filling tag ${state.activeIndex + 1}`;\n  }\n}\n\nfunction exportPdf() {\n  const pdf = createSaleTagPdf(state.tags);\n  const blob = new Blob([pdf], { type: \"application/pdf\" });\n  const url = URL.createObjectURL(blob);\n  const link = document.createElement(\"a\");\n  link.href = url;\n  link.download = \"sale-tags.pdf\";\n  link.click();\n  URL.revokeObjectURL(url);\n}\n\nfunction createSaleTagPdf(tags) {\n  const pageWidth = 612;\n  const pageHeight = 792;\n  const marginX = 13;\n  const marginY = 31;\n  const tagWidth = 145.75;\n  const tagHeight = 242;\n  const gapX = 4;\n  const gapY = 4;\n  const commands = [];\n\n  tags.forEach((tag, index) => {\n    if (!tag) return;\n    const row = Math.floor(index / 4);\n    const col = index % 4;\n    const x = marginX + col * (tagWidth + gapX);\n    const y = marginY + row * (tagHeight + gapY);\n    drawSaleTag(commands, tag, x, y, tagWidth, tagHeight, pageHeight);\n  });\n\n  return buildPdf(pageWidth, pageHeight, commands.join(\"\\n\"));\n}\n\nfunction drawSaleTag(commands, tag, x, y, width, height, pageHeight) {\n  drawText(commands, tag.description.toUpperCase(), x + 13, y + 17, pageHeight, 8, \"F2\", \"0 0 0 rg\");\n  drawText(commands, tag.upc, x + 13, y + 32, pageHeight, 6, \"F2\");\n  drawText(commands, tag.orderNumber, x + 13, y + 44, pageHeight, 6, \"F2\");\n  drawRightText(commands, tag.size, x + width - 13, y + 44, pageHeight, 6, \"F2\");\n\n  drawCenteredText(commands, tag.salePrice, x + width / 2, y + 168, pageHeight, priceFontSize(tag.salePrice), \"F2\", width - 24);\n\n  drawCenteredText(commands, tag.savings, x + 70, y + height - 20, pageHeight, 13, \"F2\", 42);\n  drawText(commands, \"Sale Ends\", x + width - 50, y + height - 31, pageHeight, 7, \"F2\", \"0 0 0 rg\");\n  drawText(commands, tag.endDate, x + width - 50, y + height - 17, pageHeight, 8, \"F2\", \"0 0 0 rg\");\n}\n\nfunction priceFontSize(value) {\n  const length = String(value || \"\").length;\n  if (length > 7) return 30;\n  if (length > 5) return 34;\n  return 40;\n}\n\nfunction fillRect(commands, x, topY, width, height, pageHeight, color) {\n  const y = pageHeight - topY - height;\n  commands.push(`${color} ${roundPdf(x)} ${roundPdf(y)} ${roundPdf(width)} ${roundPdf(height)} re f`);\n}\n\nfunction drawText(commands, text, x, topY, pageHeight, size, fontName, color = \"0 0 0 rg\") {\n  if (!text) return;\n  const baseline = pageHeight - topY;\n  commands.push(`${color} BT /${fontName} ${size} Tf 1 0 0 1 ${roundPdf(x)} ${roundPdf(baseline)} Tm (${escapePdfText(text)}) Tj ET`);\n}\n\nfunction drawRightText(commands, text, rightX, topY, pageHeight, size, fontName) {\n  if (!text) return;\n  const width = estimatePdfTextWidth(text, size);\n  drawText(commands, text, rightX - width, topY, pageHeight, size, fontName);\n}\n\nfunction drawCenteredText(commands, text, centerX, topY, pageHeight, size, fontName, maxWidth) {\n  if (!text) return;\n  const fitted = fitPdfText(text, size, maxWidth);\n  const width = estimatePdfTextWidth(fitted, size);\n  drawText(commands, fitted, centerX - width / 2, topY, pageHeight, size, fontName);\n}\n\nfunction fitPdfText(text, size, maxWidth) {\n  let output = String(text);\n  while (output.length > 1 && estimatePdfTextWidth(output, size) > maxWidth) {\n    output = output.slice(0, -1);\n  }\n  return output;\n}\n\nfunction estimatePdfTextWidth(text, size) {\n  return String(text).length * size * 0.56;\n}\n\nfunction buildPdf(pageWidth, pageHeight, content) {\n  const objects = [\n    \"<< /Type /Catalog /Pages 2 0 R >>\",\n    \"<< /Type /Pages /Kids [3 0 R] /Count 1 >>\",\n    `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidth} ${pageHeight}] /Resources << /Font << /F1 4 0 R /F2 5 0 R >> >> /Contents 6 0 R >>`,\n    \"<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>\",\n    \"<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>\",\n    `<< /Length ${content.length} >>\\nstream\\n${content}\\nendstream`\n  ];\n  let pdf = \"%PDF-1.4\\n\";\n  const offsets = [0];\n  objects.forEach((object, index) => {\n    offsets.push(pdf.length);\n    pdf += `${index + 1} 0 obj\\n${object}\\nendobj\\n`;\n  });\n  const xrefOffset = pdf.length;\n  pdf += `xref\\n0 ${objects.length + 1}\\n0000000000 65535 f \\n`;\n  offsets.slice(1).forEach((offset) => {\n    pdf += `${String(offset).padStart(10, \"0\")} 00000 n \\n`;\n  });\n  pdf += `trailer\\n<< /Size ${objects.length + 1} /Root 1 0 R >>\\nstartxref\\n${xrefOffset}\\n%%EOF`;\n\n  const bytes = new Uint8Array(pdf.length);\n  for (let i = 0; i < pdf.length; i += 1) {\n    bytes[i] = pdf.charCodeAt(i) & 0xff;\n  }\n  return bytes;\n}\n\nfunction escapePdfText(value) {\n  return String(value)\n    .replace(/\\\\/g, \"\\\\\\\\\")\n    .replace(/\\(/g, \"\\\\(\")\n    .replace(/\\)/g, \"\\\\)\");\n}\n\nfunction escapeHtml(value) {\n  return String(value)\n    .replace(/&/g, \"&amp;\")\n    .replace(/<\/g, \"&lt;\")\n    .replace(/>/g, \"&gt;\")\n    .replace(/\"/g, \"&quot;\");\n}\n\nfunction roundPdf(value) {\n  return Number(value).toFixed(3).replace(/\\.?0+$/, \"\");\n}\n\nform.addEventListener(\"submit\", (event) => {\n  event.preventDefault();\n  state.tags[state.activeIndex] = currentFormData();\n  advance();\n  clearForm();\n  renderSheet();\n  updateStatus();\n  save();\n});\n\ndocument.querySelector(\"#skipButton\").addEventListener(\"click\", () => {\n  advance();\n  renderSheet();\n  updateStatus();\n  save();\n});\n\nundoButton.addEventListener(\"click\", () => {\n  const previous = Math.max(0, state.activeIndex - 1);\n  state.activeIndex = previous;\n  if (state.tags[previous]) loadTagIntoForm(state.tags[previous]);\n  renderSheet();\n  updateStatus();\n  save();\n});\n\ndocument.querySelector(\"#printButton\").addEventListener(\"click\", () => window.print());\ndocument.querySelector(\"#pdfButton\").addEventListener(\"click\", exportPdf);\ndocument.querySelector(\"#clearButton\").addEventListener(\"click\", () => {\n  if (!confirm(\"Clear all 12 sale tags?\")) return;\n  state.tags = Array.from({ length: TOTAL_TAGS }, () => null);\n  state.activeIndex = 0;\n  clearForm();\n  renderSheet();\n  updateStatus();\n  save();\n});\n\ninit();\n\n<\/script>\n  <\/body>\n<\/html>\n"},"signs":{"title":"Signs","html":"<!doctype html>\n<html lang=\"en\">\n  <head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Sign Maker<\/title>\n    <style>\n:root {\n  --ink: #111111;\n  --muted: #66757c;\n  --panel: #f4f7f6;\n  --line: #cfd8d5;\n  --accent: #176b5b;\n  --paper: #fffefa;\n  --shadow: 0 18px 50px rgba(23, 35, 40, 0.16);\n}\n\n* {\n  box-si idth: 0.64in;\n  height: 0.58in;\n  font-size: 0.18in;\n  font-weight: 900;\n  line-height: 0.95;\n  text-transform: uppercase;\n}\n\n.savings-line::before {\n  content: \"SAVE\";\n  display: block;\n  font-size: 0.15in;\n}\n\n.details-line {\n  top: 2.58in;\n  left: 1.22in;\n  right: 0.75in;\n  height: 0.24in;\n  font-size: 0.23in;\n  font-weight: 900;\n  line-height: 1.05;\n  text-transform: uppercase;\n}\n\n.date-line {\n  display: grid;\n  grid-template-rows: auto auto;\n  place-items: center;\n  top: 2.6in;\n  height: 0.2in;\n  left: 0.18in;\n  right: auto;\n  width: 1.15in;\n  font-size: 0.14in;\n  font-weight: 900;\n  line-height: 1;\n  text-align: left;\n  text-transform: uppercase;\n}\n\n.date-line::before {\n  content: \"AD ENDS\";\n  display: block;\n  font-size: 0.1in;\n}\n\n.additional-info-line {\n  display: grid;\n  place-items: center;\n  font-family: Arial, Helvetica, sans-serif;\n  font-weight: 900;\n  line-height: 1.05;\n  text-align: center;\n  text-transform: uppercase;\n  white-space: normal;\n}\n\n.large-sign .price-line {\n  top: 2.42in;\n  left: 3.04in;\n  right: 1.21in;\n  height: 2.45in;\n  overflow: visible;\n}\n\n.small-sign .price-line {\n  top: 1.32in;\n  left: 1.8in;\n  right: 0.72in;\n  height: 1.05in;\n}\n\n.small-sign .dollar-symbol {\n  left: 0.08in;\n  font-size: 0.42in;\n  line-height: 1;\n}\n\n.small-sign .price-value {\n  font-size: 1in;\n  line-height: 1;\n}\n\n.small-sign .brand-name {\n  top: 2.34in;\n  left: 1.7in;\n  right: 1.3in;\n  height: 0.46in;\n  font-size: 0.361in;\n}\n\n.small-sign .product-name {\n  top: 2.72in;\n  left: 1.62in;\n  right: 1.18in;\n  height: 0.34in;\n  font-size: 0.25in;\n}\n\n.small-sign .details-line {\n  top: 2.98in;\n  left: 1.58in;\n  right: 0.98in;\n  height: 0.48in;\n  font-size: 0.25in;\n}\n\n.small-sign .savings-line {\n  top: 2.58in;\n  right: 0.58in;\n  width: 0.9in;\n  height: 0.86in;\n  font-size: 0.389in;\n}\n\n.small-sign .savings-line::before {\n  font-size: 0.28in;\n}\n\n.small-sign .date-line {\n  top: 2.88in;\n  left: 0.9in;\n  width: 1.55in;\n  height: 0.5in;\n  font-size: 0.25in;\n}\n\n.small-sign .date-line::before {\n  font-size: 0.18in;\n}\n\n.edlp-sign .savings-line,\n.edlp-sign .date-line,\n.edlp-sign .additional-info-line {\n  display: none;\n}\n\n.small-sign .additional-info-line {\n  top: 1.5in;\n  left: 0.95in;\n  right: auto;\n  width: 1.18in;\n  height: 0.86in;\n  font-size: 0.2in;\n}\n\n.large-sign .max-banner {\n  height: 1.86in;\n  grid-template-columns: 1.28in 1fr 2.42in;\n  column-gap: 0.13in;\n  padding: 0.13in 0.26in;\n}\n\n.large-sign .max-top {\n  font-size: 0.53in;\n}\n\n.large-sign .max-main {\n  font-size: 1.19in;\n  -webkit-text-stroke: 0.055in #ffffff;\n}\n\n.large-sign .max-points {\n  border-width: 0.06in;\n  padding: 0.09in;\n  font-size: 0.29in;\n}\n\n.large-sign .dollar-symbol {\n  left: 0.2in;\n  font-size: 0.75in;\n  line-height: 1;\n}\n\n.large-sign .price-value {\n  font-size: 2.222in;\n  line-height: 1;\n}\n\n.large-sign .product-name {\n  top: 5.26in;\n  left: 2.75in;\n  right: 1.98in;\n  height: 0.48in;\n  font-size: 0.333in;\n}\n\n.large-sign .brand-name {\n  top: 4.52in;\n  left: 2.86in;\n  right: 2.2in;\n  height: 0.82in;\n  font-size: 0.667in;\n  font-style: normal;\n}\n\n.large-sign .savings-line {\n  top: 4.57in;\n  left: auto;\n  right: 0.85in;\n  width: 1.41in;\n  height: 1.7in;\n  font-size: 0.667in;\n}\n\n.large-sign .savings-line::before {\n  font-size: 0.46in;\n}\n\n.large-sign .details-line {\n  top: 5.78in;\n  left: 2.68in;\n  right: 1.65in;\n  height: 0.68in;\n  font-size: 0.333in;\n  font-weight: 900;\n}\n\n.large-sign .date-line {\n  top: 5.92in;\n  left: 0.4in;\n  width: 2.55in;\n  height: 0.78in;\n  font-size: 0.389in;\n}\n\n.large-sign .date-line::before {\n  font-size: 0.28in;\n}\n\n.large-sign .additional-info-line {\n  top: 2.55in;\n  left: 0.72in;\n  right: auto;\n  width: 2.35in;\n  height: 1.45in;\n  font-size: 0.36in;\n}\n\n@media (max-width: 1080px) {\n  .app-shell {\n    grid-template-columns: 1fr;\n  }\n\n  .controls {\n    position: static;\n  }\n}\n\n@media (max-width: 560px) {\n  .app-shell {\n    width: calc(100% - 18px);\n    padding: 9px 0;\n  }\n\n  .two-column,\n  .actions {\n    grid-template-columns: 1fr;\n  }\n}\n\n@media print {\n  @page smallSign {\n    size: 6.5in 3.63in;\n    margin: 0;\n  }\n\n  @page largeSign {\n    size: 11in 7in;\n    margin: 0;\n  }\n\n  body {\n    background: #ffffff;\n  }\n\n  .controls,\n  .preview-toolbar {\n    display: none !important;\n  }\n\n  .app-shell,\n  .preview-panel,\n  .paper-stage {\n    display: block;\n    width: auto;\n    margin: 0;\n    padding: 0;\n    border: 0;\n    box-shadow: none;\n    background: transparent;\n  }\n\n  .sign-preview {\n    page: smallSign;\n    border: 0;\n    margin: 0;\n  }\n\n  .large-sign {\n    page: largeSign;\n  }\n}\n\n<\/style>\n  <\/head>\n  <body>\n    <main class=\"app-shell\">\n      <section class=\"controls\" aria-label=\"Sign entry form\">\n        <div class=\"brand-row\">\n          <div>\n            <h1>Sign Maker<\/h1>\n            <p>Build a landscape sign for 3x5 or 7x11 cardstock.<\/p>\n          <\/div>\n        <\/div>\n\n        <form id=\"signForm\" autocomplete=\"off\">\n          <fieldset>\n            <legend>Sign Size<\/legend>\n            <div class=\"segmented\">\n              <label>\n                <input type=\"radio\" name=\"signSize\" value=\"small\" checked>\n                <span>Small Sign<\/span>\n              <\/label>\n              <label>\n                <input type=\"radio\" name=\"signSize\" value=\"large\">\n                <span>Large Sign<\/span>\n              <\/label>\n            <\/div>\n          <\/fieldset>\n\n          <label>\n            Sign Type\n            <select id=\"signType\">\n              <option value=\"edlp\">EDLP<\/option>\n              <option value=\"ad-sale\">Ad Sale<\/option>\n              <option value=\"deal-price\">Deal Price<\/option>\n              <option value=\"max-card\">Max Card<\/option>\n            <\/select>\n          <\/label>\n\n          <label>\n            Brand\n            <input id=\"brand\" type=\"text\" value=\"\">\n          <\/label>\n\n          <label>\n            Variety\n            <input id=\"product\" type=\"text\" value=\"\">\n          <\/label>\n\n          <div class=\"two-column\">\n            <label>\n              Price\n              <input id=\"price\" type=\"text\" inputmode=\"decimal\" value=\"\">\n            <\/label>\n            <label class=\"sale-only-field\">\n              Savings\n              <input id=\"savings\" type=\"text\" value=\"\">\n            <\/label>\n          <\/div>\n\n          <label>\n            Size\n            <input id=\"details\" type=\"text\" value=\"\">\n          <\/label>\n\n          <label class=\"sale-only-field\">\n            END DATE\n            <input id=\"endDate\" type=\"text\" value=\"\">\n          <\/label>\n\n          <label class=\"sale-only-field\">\n            Additional Info\n            <textarea id=\"additionalInfo\" rows=\"3\"><\/textarea>\n          <\/label>\n\n          <div class=\"actions\" aria-label=\"Page actions\">\n            <button type=\"button\" class=\"primary\" id=\"addBatchButton\">Add to Batch<\/button>\n            <button type=\"button\" id=\"wordButton\">Export Current<\/button>\n            <button type=\"button\" id=\"exportBatchButton\">Export Batch<\/button>\n            <button type=\"button\" id=\"clearButton\">Clear<\/button>\n          <\/div>\n\n          <section class=\"batch-panel\" aria-label=\"Print batch\">\n            <div class=\"batch-header\">\n              <strong>Print Batch<\/strong>\n              <span id=\"batchCount\">0 signs<\/span>\n            <\/div>\n            <ol id=\"batchList\" class=\"batch-list\"><\/ol>\n            <button type=\"button\" id=\"clearBatchButton\">Clear Batch<\/button>\n          <\/section>\n\n          <div class=\"print-note\">\n            Add signs to the batch, load cardstock in EDLP, Ad Sale, Deal Price, Max Card order, then export the batch and print at 100%.\n          <\/div>\n        <\/form>\n      <\/section>\n\n      <section class=\"preview-panel\" aria-label=\"Sign preview\">\n        <div class=\"preview-toolbar\">\n          <strong>Preview<\/strong>\n          <span id=\"sizeLabel\">3x5 landscape sign<\/span>\n        <\/div>\n        <div class=\"paper-stage\">\n          <article class=\"sign-preview small-sign\" id=\"signPreview\">\n            <div class=\"sign-field price-line\">\n              <span class=\"price-value\" id=\"previewPrice\"><\/span>\n              <span class=\"dollar-symbol\">$<\/span>\n            <\/div>\n            <div class=\"sign-field brand-name\" id=\"previewBrand\"><\/div>\n            <div class=\"sign-field product-name\" id=\"previewProduct\"><\/div>\n            <div class=\"sign-field savings-line\" id=\"previewSavings\"><\/div>\n            <div class=\"sign-field details-line\" id=\"previewDetails\"><\/div>\n            <div class=\"sign-field date-line\" id=\"previewEndDate\"><\/div>\n            <div class=\"sign-field additional-info-line\" id=\"previewAdditionalInfo\"><\/div>\n          <\/article>\n        <\/div>\n      <\/section>\n    <\/main><script>\n\n\nconst fields = {\n  size: document.querySelectorAll('input[name=\"signSize\"]'),\n  signType: document.querySelector(\"#signType\"),\n  product: document.querySelector(\"#product\"),\n  brand: document.querySelector(\"#brand\"),\n  price: document.querySelector(\"#price\"),\n  savings: document.querySelector(\"#savings\"),\n  details: document.querySelector(\"#details\"),\n  endDate: document.querySelector(\"#endDate\"),\n  additionalInfo: document.querySelector(\"#additionalInfo\")\n};\n\nconst preview = document.querySelector(\"#signPreview\");\nconst sizeLabel = document.querySelector(\"#sizeLabel\");\nconst previewProduct = document.querySelector(\"#previewProduct\");\nconst previewBrand = document.querySelector(\"#previewBrand\");\nconst previewPrice = document.querySelector(\"#previewPrice\");\nconst previewSavings = document.querySelector(\"#previewSavings\");\nconst previewDetails = document.querySelector(\"#previewDetails\");\nconst previewEndDate = document.querySelector(\"#previewEndDate\");\nconst previewAdditionalInfo = document.querySelector(\"#previewAdditionalInfo\");\nconst batchList = document.querySelector(\"#batchList\");\nconst batchCount = document.querySelector(\"#batchCount\");\nconst printPageSizeStyle = document.createElement(\"style\");\nconst SIGN_TYPES = {\n  \"edlp\": { label: \"EDLP\", order: 1 },\n  \"ad-sale\": { label: \"Ad Sale\", order: 2 },\n  \"deal-price\": { label: \"Deal Price\", order: 3 },\n  \"max-card\": { label: \"Max Card\", order: 4 }\n};\nlet batchSigns = [];\n\nprintPageSizeStyle.id = \"printPageSize\";\ndocument.head.appendChild(printPageSizeStyle);\n\nfunction selectedSize() {\n  return [...fields.size].find((field) => field.checked)?.value || \"small\";\n}\n\nfunction cleanPrice(value) {\n  const trimmed = value.trim();\n  if (!trimmed) return \"\";\n  return trimmed.replace(/^\\$/, \"\");\n}\n\nfunction cleanSavings(value) {\n  return value.trim().replace(/^save\\s*/i, \"\");\n}\n\nfunction escapeHtml(value) {\n  return String(value || \"\")\n    .replace(/&/g, \"&amp;\")\n    .replace(/<\/g, \"&lt;\")\n    .replace(/>/g, \"&gt;\")\n    .replace(/\"/g, \"&quot;\");\n}\n\nfunction updatePreview() {\n  const size = selectedSize();\n  const signType = fields.signType.value;\n  const signTypeLabel = SIGN_TYPES[signType].label;\n  const isEdlp = signType === \"edlp\";\n\n  preview.className = `sign-preview ${size === \"large\" ? \"large-sign\" : \"small-sign\"} ${isEdlp ? \"edlp-sign\" : \"\"}`;\n  document.body.classList.toggle(\"edlp-selected\", isEdlp);\n  sizeLabel.textContent = `${size === \"large\" ? \"Large\" : \"Small\"} ${signTypeLabel} sign`;\n\n  previewProduct.textContent = fields.product.value.trim();\n  previewBrand.textContent = fields.brand.value.trim();\n  previewPrice.textContent = cleanPrice(fields.price.value);\n  previewSavings.textContent = cleanSavings(fields.savings.value);\n  previewDetails.textContent = fields.details.value.trim();\n  previewEndDate.textContent = fields.endDate.value.trim();\n  previewAdditionalInfo.textContent = fields.additionalInfo.value.trim();\n}\n\nfunction preparePrintPageSize() {\n  const size = selectedSize();\n  const signWidth = size === \"large\" ? \"11in\" : \"6.5in\";\n  const signHeight = size === \"large\" ? \"7in\" : \"3.63in\";\n  const pageWidth = size === \"large\" ? \"7in\" : \"3.63in\";\n  const pageHeight = size === \"large\" ? \"11in\" : \"6.5in\";\n\n  printPageSizeStyle.textContent = `\n    @media print {\n      @page {\n        size: ${pageWidth} ${pageHeight};\n        margin: 0;\n      }\n\n      html,\n      body {\n        width: ${pageWidth};\n        height: ${pageHeight};\n        overflow: hidden;\n      }\n\n      .sign-preview {\n        position: absolute;\n        top: 0;\n        left: ${pageWidth};\n        width: ${signWidth};\n        height: ${signHeight};\n        transform: rotate(90deg);\n        transform-origin: top left;\n      }\n\n      .large-art,\n      .small-art {\n        display: none !important;\n      }\n    }\n  `;\n}\n\nfunction currentSignData() {\n  return {\n    id: Date.now() + Math.random(),\n    size: selectedSize(),\n    signType: fields.signType.value,\n    brand: fields.brand.value.trim(),\n    variety: fields.product.value.trim(),\n    price: cleanPrice(fields.price.value),\n    savings: cleanSavings(fields.savings.value),\n    details: fields.details.value.trim(),\n    endDate: fields.endDate.value.trim(),\n    additionalInfo: fields.additionalInfo.value.trim()\n  };\n}\n\nasync function exportWordDoc() {\n  const data = currentSignData();\n  const isLarge = data.size === \"large\";\n  const pageWidth = isLarge ? 11 : 6.5;\n  const pageHeight = isLarge ? 7 : 3.63;\n  const layout = isLarge ? largeWordLayout() : smallWordLayout();\n  const mhtml = await buildImageWordDoc(data, pageWidth, pageHeight, layout);\n  const blob = new Blob([mhtml], { type: \"application/msword;charset=utf-8\" });\n  const url = URL.createObjectURL(blob);\n  const link = document.createElement(\"a\");\n\n  link.href = url;\n  link.download = isLarge ? \"large-sign-landscape-image.doc\" : \"small-sign-landscape-image.doc\";\n  link.click();\n  URL.revokeObjectURL(url);\n}\n\nasync function exportBatchDoc() {\n  if (!batchSigns.length) {\n    alert(\"Add at least one sign to the batch first.\");\n    return;\n  }\n\n  const firstSize = batchSigns[0].size;\n  if (batchSigns.some((sign) => sign.size !== firstSize)) {\n    alert(\"Please keep one paper size per batch. Export 3x5 signs and 7x11 signs separately.\");\n    return;\n  }\n\n  const isLarge = firstSize === \"large\";\n  const pageWidth = isLarge ? 11 : 6.5;\n  const pageHeight = isLarge ? 7 : 3.63;\n  const layout = isLarge ? largeWordLayout() : smallWordLayout();\n  const orderedSigns = orderedBatchSigns();\n  const mhtml = await buildImageWordDoc(orderedSigns, pageWidth, pageHeight, layout);\n  const blob = new Blob([mhtml], { type: \"application/msword;charset=utf-8\" });\n  const url = URL.createObjectURL(blob);\n  const link = document.createElement(\"a\");\n\n  link.href = url;\n  link.download = isLarge ? \"large-sign-batch-image.doc\" : \"small-sign-batch-image.doc\";\n  link.click();\n  URL.revokeObjectURL(url);\n}\n\nfunction addCurrentToBatch() {\n  const sign = currentSignData();\n\n  if (batchSigns.length && batchSigns[0].size !== sign.size) {\n    alert(\"This batch already has a different paper size. Export or clear it before adding this sign.\");\n    return;\n  }\n\n  batchSigns.push(sign);\n  renderBatchList();\n  clearForm();\n}\n\nfunction orderedBatchSigns() {\n  return [...batchSigns].sort((a, b) => {\n    const typeDiff = SIGN_TYPES[a.signType].order - SIGN_TYPES[b.signType].order;\n    return typeDiff || batchSigns.indexOf(a) - batchSigns.indexOf(b);\n  });\n}\n\nfunction renderBatchList() {\n  const orderedSigns = orderedBatchSigns();\n  batchCount.textContent = `${batchSigns.length} ${batchSigns.length === 1 ? \"sign\" : \"signs\"}`;\n  batchList.innerHTML = orderedSigns\n    .map((sign) => {\n      const type = SIGN_TYPES[sign.signType].label;\n      const size = sign.size === \"large\" ? \"7x11\" : \"3x5\";\n      return `<li>\n        <span><strong>${escapeHtml(type)}<\/strong> ${escapeHtml(sign.brand || \"Untitled\")} ${escapeHtml(sign.price ? \"$\" + sign.price : \"\")}<\/span>\n        <small>${escapeHtml(size)}<\/small>\n        <button type=\"button\" data-remove-id=\"${sign.id}\">Remove<\/button>\n      <\/li>`;\n    })\n    .join(\"\");\n}\n\nfunction removeBatchSign(id) {\n  batchSigns = batchSigns.filter((sign) => String(sign.id) !== String(id));\n  renderBatchList();\n}\n\nfunction clearBatch() {\n  batchSigns = [];\n  renderBatchList();\n}\n\nfunction smallWordLayout() {\n  return {\n    wordShiftX: 0.25,\n    bannerHeight: 1,\n    bannerColumns: \"0.75in 1fr 1.43in\",\n    bannerGap: 0.08,\n    bannerPaddingY: 0.07,\n    bannerPaddingX: 0.16,\n    maxTopSize: 0.31,\n    maxMainSize: 0.7,\n    maxStroke: 0.032,\n    pointsSize: 0.16,\n    pointsBorder: 0.035,\n    priceTop: 1.32,\n    priceLeft: 1.8,\n    priceRight: 0.72,\n    priceHeight: 1.05,\n    dollarSize: 0.42,\n    dollarLeftOffset: 0.08,\n    priceSize: 1,\n    brandTop: 2.34,\n    brandLeft: 1.7,\n    brandRight: 1.3,\n    brandSize: 0.361,\n    varietyTop: 2.72,\n    varietyLeft: 1.62,\n    varietyRight: 1.18,\n    varietySize: 0.25,\n    detailsTop: 2.98,\n    detailsLeft: 1.58,\n    detailsRight: 0.98,\n    detailsSize: 0.25,\n    savingsTop: 2.58,\n    savingsRight: 0.58,\n    savingsWidth: 0.9,\n    savingsSize: 0.389,\n    savingsLabelSize: 0.28,\n    dateTop: 2.88,\n    dateLeft: 0.9,\n    dateWidth: 1.55,\n    dateSize: 0.25,\n    dateLabelSize: 0.18,\n    additionalInfoTop: 1.5,\n    additionalInfoLeft: 0.7,\n    additionalInfoWidth: 1.18,\n    additionalInfoHeight: 0.86,\n    additionalInfoSize: 0.2\n  };\n}\n\nfunction largeWordLayout() {\n  return {\n    wordShiftX: 0.3,\n    bannerHeight: 1.86,\n    bannerColumns: \"1.28in 1fr 2.42in\",\n    bannerGap: 0.13,\n    bannerPaddingY: 0.13,\n    bannerPaddingX: 0.26,\n    maxTopSize: 0.53,\n    maxMainSize: 1.19,\n    maxStroke: 0.055,\n    pointsSize: 0.29,\n    pointsBorder: 0.06,\n    priceTop: 2.42,\n    priceLeft: 3.04,\n    priceRight: 1.21,\n    priceHeight: 2.45,\n    dollarSize: 0.75,\n    dollarLeftOffset: 0.2,\n    priceSize: 2.222,\n    brandTop: 4.52,\n    brandLeft: 2.86,\n    brandRight: 2.2,\n    brandSize: 0.667,\n    varietyTop: 5.26,\n    varietyLeft: 2.75,\n    varietyRight: 1.98,\n    varietySize: 0.333,\n    detailsTop: 5.78,\n    detailsLeft: 2.68,\n    detailsRight: 1.65,\n    detailsSize: 0.333,\n    savingsTop: 4.57,\n    savingsRight: 0.85,\n    savingsWidth: 1.41,\n    savingsSize: 0.667,\n    savingsLabelSize: 0.46,\n    dateTop: 5.92,\n    dateLeft: 0.4,\n    dateWidth: 2.55,\n    dateSize: 0.389,\n    dateLabelSize: 0.28,\n    additionalInfoTop: 2.55,\n    additionalInfoLeft: 0.42,\n    additionalInfoWidth: 2.35,\n    additionalInfoHeight: 1.45,\n    additionalInfoSize: 0.36\n  };\n}\n\nasync function buildImageWordDoc(signData, pageWidth, pageHeight, l) {\n  const signs = Array.isArray(signData) ? signData : [signData];\n  const shiftX = l.wordShiftX || 0;\n  const priceWidth = pageWidth - l.priceLeft - l.priceRight;\n  const brandHeight = Math.max(0.7, l.brandSize * 1.4);\n  const varietyHeight = Math.max(0.6, l.varietySize * 1.4);\n  const detailsHeight = Math.max(0.6, l.detailsSize * 1.4);\n  const savingsHeight = Math.max(1, (l.savingsLabelSize + l.savingsSize) * 1.6);\n  const dateHeight = Math.max(0.5, (l.dateLabelSize + l.dateSize) * 1.45);\n  const dollarBox = Math.max(0.45, l.dollarSize * 1.15);\n  const pageSpecs = signs.map((data) => {\n    const specs = [\n        {\n        left: l.priceLeft + shiftX,\n        top: l.priceTop,\n        width: priceWidth,\n        height: l.priceHeight,\n        lines: [data.price],\n        sizes: l.priceSize,\n        font: \"Impact\"\n      },\n      {\n        left: l.priceLeft + shiftX + (l.dollarLeftOffset || 0),\n        top: l.priceTop + 0.03,\n        width: dollarBox,\n        height: dollarBox,\n        lines: [\"$\"],\n        sizes: l.dollarSize,\n        font: \"Impact\",\n        align: \"left\"\n      },\n      {\n        left: l.brandLeft + shiftX,\n        top: l.brandTop,\n        width: pageWidth - l.brandLeft - l.brandRight,\n        height: brandHeight,\n        lines: [data.brand],\n        sizes: l.brandSize,\n        font: \"Impact\"\n      },\n      {\n        left: l.varietyLeft + shiftX,\n        top: l.varietyTop,\n        width: pageWidth - l.varietyLeft - l.varietyRight,\n        height: varietyHeight,\n        lines: [data.variety],\n        sizes: l.varietySize,\n        font: \"Impact\"\n      },\n      {\n        left: l.detailsLeft + shiftX,\n        top: l.detailsTop,\n        width: pageWidth - l.detailsLeft - l.detailsRight,\n        height: detailsHeight,\n        lines: [data.details],\n        sizes: l.detailsSize,\n        font: \"Impact\"\n      }\n    ];\n\n    if (data.signType !== \"edlp\") {\n      specs.push({\n        left: pageWidth - l.savingsRight - l.savingsWidth + shiftX,\n        top: l.savingsTop,\n        width: l.savingsWidth,\n        height: savingsHeight,\n        lines: [\"SAVE\", data.savings],\n        sizes: [l.savingsLabelSize, l.savingsSize],\n        font: \"Arial\"\n      });\n      specs.push({\n        left: l.dateLeft + shiftX,\n        top: l.dateTop,\n        width: l.dateWidth,\n        height: dateHeight,\n        lines: [\"AD ENDS\", data.endDate],\n        sizes: [l.dateLabelSize, l.dateSize],\n        font: \"Arial\"\n      });\n      specs.push({\n        left: l.additionalInfoLeft + shiftX,\n        top: l.additionalInfoTop,\n        width: l.additionalInfoWidth,\n        height: l.additionalInfoHeight,\n        lines: [data.additionalInfo],\n        sizes: l.additionalInfoSize,\n        font: \"Arial\",\n        wrap: true,\n        maxLines: 3\n      });\n    }\n\n    return specs;\n  });\n  const pages = await Promise.all(\n    pageSpecs.map(async (specs, pageIndex) => [{\n      name: `sign-page-${pageIndex + 1}.png`,\n      left: 0,\n      top: 0,\n      width: pageWidth,\n      height: pageHeight,\n      base64: await renderSignPagePng(specs, pageWidth, pageHeight)\n    }])\n  );\n  return buildMhtmlWordDoc(pageWidth, pageHeight, pages);\n}\n\nfunction buildMhtmlWordDoc(pageWidth, pageHeight, pages) {\n  const boundary = \"----=_SignMakerImageExport\";\n  const allImages = pages.flat();\n  const html = `<html xmlns:o=\"urn:schemas-microsoft-com:office:office\"\nxmlns:w=\"urn:schemas-microsoft-com:office:word\"\nxmlns:v=\"urn:schemas-microsoft-com:vml\">\n<head>\n<meta charset=\"utf-8\">\n<!--[if gte mso 9]>\n<xml>\n  <w:WordDocument>\n    <w:View>Print<\/w:View>\n    <w:Zoom>100<\/w:Zoom>\n  <\/w:WordDocument>\n<\/xml>\n<![endif]-->\n<style>\n@page Section1 {\n  size: ${pageWidth}in ${pageHeight}in;\n  mso-page-orientation: landscape;\n  margin: 0;\n}\nhtml,\nbody {\n  margin: 0;\n  padding: 0;\n}\n.Section1 {\n  page: Section1;\n  width: ${pageWidth}in;\n  height: ${pageHeight}in;\n  overflow: hidden;\n  margin: 0;\n  padding: 0;\n}\n.sign-page-image {\n  display: block;\n  width: ${pageWidth}in;\n  height: ${pageHeight}in;\n  margin: 0;\n  padding: 0;\n  border: 0;\n}\n.page-break-after {\n  page-break-after: always;\n}\n<\/style>\n<\/head>\n<body>\n${pages.map((images, index) => `<div class=\"Section1${index < pages.length - 1 ? \" page-break-after\" : \"\"}\">\n  <img class=\"sign-page-image\" src=\"${images[0].name}\" width=\"${Math.round(pageWidth * 96)}\" height=\"${Math.round(pageHeight * 96)}\">\n<\/div>`).join(\"\\n\")}\n<\/body>\n<\/html>`;\n  const imageParts = allImages\n    .map((image) => [\n      `--${boundary}`,\n      \"Content-Type: image/png\",\n      \"Content-Transfer-Encoding: base64\",\n      `Content-Location: ${image.name}`,\n      \"\",\n      chunkBase64(image.base64)\n    ].join(\"\\r\\n\"))\n    .join(\"\\r\\n\");\n\n  return [\n    \"MIME-Version: 1.0\",\n    `Content-Type: multipart/related; boundary=\"${boundary}\"`,\n    \"\",\n    `--${boundary}`,\n    'Content-Type: text/html; charset=\"utf-8\"',\n    \"Content-Location: sign.htm\",\n    \"\",\n    html,\n    imageParts,\n    `--${boundary}--`,\n    \"\"\n  ].join(\"\\r\\n\");\n}\n\nfunction renderTextPng(spec) {\n  const dpi = 300;\n  const canvas = document.createElement(\"canvas\");\n  const width = Math.max(1, Math.round(spec.width * dpi));\n  const height = Math.max(1, Math.round(spec.height * dpi));\n  const lines = spec.lines.map((line) => String(line || \"\").toUpperCase());\n  const sizes = Array.isArray(spec.sizes) ? spec.sizes : lines.map(() => spec.sizes);\n  const lineHeights = sizes.map((size) => size * dpi * 1.03);\n  const totalHeight = lineHeights.reduce((sum, lineHeight) => sum + lineHeight, 0);\n  const align = spec.align || \"center\";\n  const padding = Math.round(0.02 * dpi);\n  let y = (height - totalHeight) / 2;\n\n  canvas.width = width;\n  canvas.height = height;\n  const context = canvas.getContext(\"2d\");\n  context.clearRect(0, 0, width, height);\n  context.fillStyle = spec.color || \"#000000\";\n  context.textAlign = align;\n  context.textBaseline = \"middle\";\n\n  lines.forEach((line, index) => {\n    const fontPx = sizes[index] * dpi;\n    context.font = `900 ${fontPx}px ${spec.font}, Arial, sans-serif`;\n    const x = align === \"left\" ? padding : width / 2;\n    const lineCenter = y + lineHeights[index] / 2;\n    context.fillText(line, x, lineCenter, width - (padding * 2));\n    y += lineHeights[index];\n  });\n\n  return Promise.resolve(canvas.toDataURL(\"image/png\").split(\",\")[1]);\n}\n\nfunction renderSignPagePng(specs, pageWidth, pageHeight) {\n  const dpi = 300;\n  const canvas = document.createElement(\"canvas\");\n  const context = canvas.getContext(\"2d\");\n\n  canvas.width = Math.round(pageWidth * dpi);\n  canvas.height = Math.round(pageHeight * dpi);\n  context.clearRect(0, 0, canvas.width, canvas.height);\n\n  specs.forEach((spec) => {\n    drawTextBlock(context, spec, dpi);\n  });\n\n  return Promise.resolve(canvas.toDataURL(\"image/png\").split(\",\")[1]);\n}\n\nfunction drawTextBlock(context, spec, dpi) {\n  const left = Math.round(spec.left * dpi);\n  const top = Math.round(spec.top * dpi);\n  const width = Math.max(1, Math.round(spec.width * dpi));\n  const height = Math.max(1, Math.round(spec.height * dpi));\n  const baseSize = Array.isArray(spec.sizes) ? spec.sizes[0] : spec.sizes;\n  const baseFontPx = baseSize * dpi;\n  context.font = `900 ${baseFontPx}px ${spec.font}, Arial, sans-serif`;\n  const rawLines = spec.lines.map((line) => String(line || \"\").toUpperCase());\n  const lines = spec.wrap\n    ? wrapCanvasText(context, rawLines.join(\" \"), width - (Math.round(0.02 * dpi) * 2), spec.maxLines || 3)\n    : rawLines;\n  const sizes = Array.isArray(spec.sizes) && !spec.wrap ? spec.sizes : lines.map(() => baseSize);\n  const lineHeights = sizes.map((size) => size * dpi * 1.03);\n  const totalHeight = lineHeights.reduce((sum, lineHeight) => sum + lineHeight, 0);\n  const align = spec.align || \"center\";\n  const padding = Math.round(0.02 * dpi);\n  let y = top + (height - totalHeight) / 2;\n\n  context.save();\n  context.beginPath();\n  context.rect(left, top, width, height);\n  context.clip();\n  context.fillStyle = spec.color || \"#000000\";\n  context.textAlign = align;\n  context.textBaseline = \"middle\";\n\n  lines.forEach((line, index) => {\n    const fontPx = sizes[index] * dpi;\n    context.font = `900 ${fontPx}px ${spec.font}, Arial, sans-serif`;\n    const x = align === \"left\" ? left + padding : left + (width / 2);\n    const lineCenter = y + lineHeights[index] / 2;\n    context.fillText(line, x, lineCenter, width - (padding * 2));\n    y += lineHeights[index];\n  });\n\n  context.restore();\n}\n\nfunction wrapCanvasText(context, text, maxWidth, maxLines) {\n  const words = text.split(/\\s+/).filter(Boolean);\n  const lines = [];\n  let line = \"\";\n\n  words.forEach((word) => {\n    const nextLine = line ? `${line} ${word}` : word;\n    if (context.measureText(nextLine).width <= maxWidth || !line) {\n      line = nextLine;\n      return;\n    }\n\n    lines.push(line);\n    line = word;\n  });\n\n  if (line) {\n    lines.push(line);\n  }\n\n  if (lines.length <= maxLines) {\n    return lines;\n  }\n\n  const trimmed = lines.slice(0, maxLines);\n  trimmed[maxLines - 1] = `${trimmed[maxLines - 1]} ${lines.slice(maxLines).join(\" \")}`.trim();\n  return trimmed;\n}\n\nfunction chunkBase64(value) {\n  return value.match(/.{1,76}/g).join(\"\\r\\n\");\n}\n\nfunction buildWordHtml(data, pageWidth, pageHeight, l) {\n  const priceWidth = pageWidth - l.priceLeft - l.priceRight;\n  const banner = bannerMetrics(pageWidth, l);\n  const margin = \"1.2in .4in .5in .4in\";\n  const shiftX = l.wordShiftX || 0;\n  const brandHeight = Math.max(0.7, l.brandSize * 1.4);\n  const varietyHeight = Math.max(0.6, l.varietySize * 1.4);\n  const detailsHeight = Math.max(0.6, l.detailsSize * 1.4);\n  const savingsHeight = Math.max(1, (l.savingsLabelSize + l.savingsSize) * 1.6);\n  const dateHeight = Math.max(0.5, l.dateSize * 1.5);\n  const dollarBox = Math.max(0.45, l.dollarSize * 1.15);\n\n  return `<html xmlns:o=\"urn:schemas-microsoft-com:office:office\"\nxmlns:w=\"urn:schemas-microsoft-com:office:word\"\nxmlns:v=\"urn:schemas-microsoft-com:vml\">\n<head>\n<meta charset=\"utf-8\">\n<!--[if gte mso 9]>\n<xml>\n  <w:WordDocument>\n    <w:View>Print<\/w:View>\n    <w:Zoom>100<\/w:Zoom>\n  <\/w:WordDocument>\n<\/xml>\n<![endif]-->\n<style>\nv\\\\:* { behavior:url(#default#VML); }\n@page Section1 {\n  size: ${pageWidth}in ${pageHeight}in;\n  mso-page-orientation: landscape;\n  margin: ${margin};\n}\nbody {\n  margin: 0;\n  padding: 0;\n  width: ${pageWidth}in;\n  height: ${pageHeight}in;\n}\ndiv.Section1 {\n  page: Section1;\n  position: relative;\n  width: ${pageWidth}in;\n  height: ${pageHeight}in;\n  overflow: hidden;\n  background: #fffefa;\n  color: #000;\n}\n<\/style>\n<\/head>\n<body>\n<div class=\"Section1\">\n  ${vRect(0, 0, pageWidth, l.bannerHeight, \"#000000\", \"\")}\n  ${vText(banner.leftX, l.bannerPaddingY, banner.leftW, l.bannerHeight - (l.bannerPaddingY * 2), wordLines([\"SAVE\", \"BIG\", \"WITH\"], l.maxTopSize, \"Impact\", \"center\", \"#ffffff\"))}\n  ${vText(banner.centerX, l.bannerPaddingY, banner.centerW, l.bannerHeight - (l.bannerPaddingY * 2), wordLine(\"MAX PLUS!\", l.maxMainSize, \"Impact\", \"center\", \"#777777\"))}\n  ${vText(banner.rightX, l.bannerPaddingY, banner.rightW, l.bannerHeight - (l.bannerPaddingY * 2), wordLines([\"EARN POINTS\", \"WITH\", \"EVERY\", \"PURCHASE\"], l.pointsSize, \"Arial\", \"center\", \"#ffffff\"))}\n  ${vText(l.priceLeft + shiftX, l.priceTop, priceWidth, l.priceHeight, wordLine(data.price, l.priceSize, \"Impact\", \"center\"))}\n  ${vText(l.priceLeft + shiftX, l.priceTop + 0.03, dollarBox, dollarBox, wordLine(\"$\", l.dollarSize, \"Impact\", \"left\"))}\n  ${vText(l.brandLeft + shiftX, l.brandTop, pageWidth - l.brandLeft - l.brandRight, brandHeight, wordLine(data.brand, l.brandSize, \"Impact\", \"center\"))}\n  ${vText(l.varietyLeft + shiftX, l.varietyTop, pageWidth - l.varietyLeft - l.varietyRight, varietyHeight, wordLine(data.variety, l.varietySize, \"Impact\", \"center\"))}\n  ${vText(l.detailsLeft + shiftX, l.detailsTop, pageWidth - l.detailsLeft - l.detailsRight, detailsHeight, wordLine(data.details, l.detailsSize, \"Impact\", \"center\"))}\n  ${vText(pageWidth - l.savingsRight - l.savingsWidth + shiftX, l.savingsTop, l.savingsWidth, savingsHeight, wordLines([\"SAVE\", data.savings], [l.savingsLabelSize, l.savingsSize], \"Arial\", \"center\"))}\n  ${vText(l.dateLeft + shiftX, l.dateTop, l.dateWidth, dateHeight, wordLine(data.endDate, l.dateSize, \"Arial\", \"center\"))}\n<\/div>\n<\/body>\n<\/html>`;\n}\n\nfunction bannerMetrics(pageWidth, l) {\n  const parts = l.bannerColumns.split(\" \");\n  const leftW = parseFloat(parts[0]);\n  const rightW = parseFloat(parts[2]);\n  const centerX = l.bannerPaddingX + leftW + l.bannerGap;\n  const rightX = pageWidth - l.bannerPaddingX - rightW;\n  return {\n    leftX: l.bannerPaddingX,\n    leftW,\n    centerX,\n    centerW: rightX - centerX - l.bannerGap,\n    rightX,\n    rightW\n  };\n}\n\nfunction vRect(left, top, width, height, fillColor, content) {\n  return `<v:rect fillcolor=\"${fillColor}\" stroked=\"f\" style=\"position:absolute;left:${left}in;top:${top}in;width:${width}in;height:${height}in;mso-position-horizontal-relative:page;mso-position-vertical-relative:page;z-index:1;\"><v:textbox inset=\"0,0,0,0\">${content}<\/v:textbox><\/v:rect>`;\n}\n\nfunction vText(left, top, width, height, content) {\n  return `<v:shape type=\"#_x0000_t202\" filled=\"f\" stroked=\"f\" style=\"position:absolute;left:${left}in;top:${top}in;width:${width}in;height:${height}in;mso-position-horizontal-relative:page;mso-position-vertical-relative:page;z-index:2;v-text-anchor:middle;\"><v:textbox inset=\"0,0,0,0\" style=\"mso-fit-shape-to-text:false\"><w:txbxContent>${content}<\/w:txbxContent><\/v:textbox><\/v:shape>`;\n}\n\nfunction toPt(inches) {\n  return Number(inches * 72).toFixed(1);\n}\n\nfunction wordLine(value, size, fontFamily, align = \"center\", color = \"#000000\") {\n  const fontSize = Array.isArray(size) ? size[0] : size;\n  return wordParagraph(value, fontSize, fontFamily, align, color);\n}\n\nfunction wordLines(values, sizes, fontFamily, align = \"center\", color = \"#000000\") {\n  return values\n    .map((value, index) => wordParagraph(value, Array.isArray(sizes) ? sizes[index] : sizes, fontFamily, align, color))\n    .join(\"\");\n}\n\nfunction wordParagraph(value, size, fontFamily, align, color) {\n  const points = toPt(size);\n  const escaped = escapeHtml(value).toUpperCase();\n  return `<p class=\"MsoNormal\" align=\"${align}\" style=\"margin:0;text-align:${align};line-height:1;mso-line-height-rule:exactly;\"><b><span style=\"font-family:${fontFamily};mso-bidi-font-family:${fontFamily};font-size:${points}pt;mso-bidi-font-size:${points}pt;color:${color};\">${escaped}<\/span><\/b><\/p>`;\n}\n\nfunction clearForm() {\n  fields.product.value = \"\";\n  fields.brand.value = \"\";\n  fields.price.value = \"\";\n  fields.savings.value = \"\";\n  fields.details.value = \"\";\n  fields.endDate.value = \"\";\n  fields.additionalInfo.value = \"\";\n  fields.product.focus();\n  updatePreview();\n}\n\ndocument.querySelector(\"#signForm\").addEventListener(\"input\", updatePreview);\nfields.signType.addEventListener(\"change\", clearForm);\ndocument.querySelector(\"#addBatchButton\").addEventListener(\"click\", addCurrentToBatch);\ndocument.querySelector(\"#wordButton\").addEventListener(\"click\", exportWordDoc);\ndocument.querySelector(\"#exportBatchButton\").addEventListener(\"click\", exportBatchDoc);\ndocument.querySelector(\"#printButton\")?.addEventListener(\"click\", () => {\n    preparePrintPageSize();\n    window.print();\n  });\ndocument.querySelector(\"#clearButton\").addEventListener(\"click\", clearForm);\ndocument.querySelector(\"#clearBatchButton\").addEventListener(\"click\", clearBatch);\nbatchList.addEventListener(\"click\", (event) => {\n  const removeButton = event.target.closest(\"[data-remove-id]\");\n  if (removeButton) {\n    removeBatchSign(removeButton.dataset.removeId);\n  }\n});\n\nupdatePreview();\nrenderBatchList();\n\n<\/script>\n  <\/body>\n<\/html>\n"}};
